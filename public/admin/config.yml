backend:
  name: github
  repo: rd-atbu-conces/conces-rd-portfolio
  branch: main

media_folder: "public/images"
public_folder: "/conces-rd-portfolio/images"

collections:
  - name: "exhibition_archive"
    label: "Exhibition Submissions Archives"
    files:
      - file: "src/content/projects/exhibition-projects/2026.json"
        label: "Exhibition Submissions (2026 Batch)"
        name: "exhibition_2026"
        format: "json"
        fields:
          - label: "Projects List Matrix"
            name: "projects"
            widget: "list"
            fields:
              # Automatically writes the generated ID right into your list item object
              - { label: "Project ID Code", name: "id", widget: "hidden", default: "p2026-e{{uuid_shorter}}" }
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Research Investigator / Lead", name: "lead", widget: "string" }
              - { label: "Exhibition Year", name: "year", widget: "number", default: 2026 }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Status", name: "status", widget: "select", options: ["Finalist", "Prototype", "Active Research"] }
              - { label: "Podium Ranking", name: "podiumRank", widget: "select", options: [{label: "Participant", value: "0"}, {label: "1st Place", value: "1"}], default: "0" }
              - { label: "Show in Homepage Spotlight?", name: "isSpotlight", widget: "boolean", default: true }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Main Image", name: "mainImage", widget: "image", required: false }
              - { label: "Live URL", name: "liveUrl", widget: "string", required: false }

  - name: "core_projects"
    label: "Core Laboratory System Projects"
    folder: "src/content/projects/projects"
    create: true
    # Automatically names the new file generated in your folder structure
    slug: "p2026-c{{uuid_shorter}}"
    identifier_field: "id"
    extension: "json"
    format: "json"
    fields:
      # Hides the ID input block and injects the core pattern inside the JSON file
      - { label: "Project ID Slug", name: "id", widget: "hidden", default: "p2026-c{{uuid_shorter}}" }
      - { label: "Core Project Title", name: "title", widget: "string" }
      - { label: "Principal Investigator", name: "lead", widget: "string" }
      - { label: "Initiation Date", name: "startDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Scientific Domain", name: "category", widget: "string" }
      - { label: "Development Phase", name: "status", widget: "select", options: ["Active Research", "Prototype Completed", "Production Scaling"] }
      - { label: "Detailed System Description", name: "description", widget: "text" }
      - { label: "Main Structural Image", name: "mainImage", widget: "image", required: false }
      - { label: "Live System Link", name: "liveUrl", widget: "string", required: false }

  - name: "team_directory"
    label: "Team Directory Settings"
    files:
      - file: "src/content/team/members.json"
        label: "Manage Team Members Roster"
        name: "members_list"
        format: "json"
        fields:
          - label: "Team Members"
            name: "members"
            widget: "list"
            fields:
              # For team members, it creates clean IDs based on a "m-[year]-[random]" format
              - { label: "Member ID", name: "id", widget: "hidden", default: "m-2026-{{uuid_shorter}}" }
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Official Role", name: "role", widget: "string" }
              - { label: "Batch Year", name: "batchYear", widget: "number", default: 2026 }
              - { label: "Designation Type", name: "type", widget: "select", options: ["Leadership", "R&D Fellow", "Contributor"] }
              - { label: "Initials", name: "initials", widget: "string" }
              - { label: "Avatar Photo", name: "avatar", widget: "image", required: false }
